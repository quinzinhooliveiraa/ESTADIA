kind = "web"
previewPath = "/"
title = "ESTADIA"
version = "1.0.0"
id = "artifacts/estadia"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22616

[services.development]
run = "pnpm --filter @workspace/estadia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/estadia", "run", "build" ]
serve = "static"
publicDir = "artifacts/estadia/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22616"
BASE_PATH = "/"
