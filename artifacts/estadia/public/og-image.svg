<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#111417"/>
  <!-- Yellow left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#FFC400"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1a1e24" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1a1e24" stroke-width="1"/>

  <!-- ESTADIA wordmark -->
  <text x="80" y="195" font-family="Arial Black, Impact, sans-serif" font-size="128" font-weight="900" fill="#FFC400" letter-spacing="-3" opacity="1">ESTADIA</text>

  <!-- Timer display — hero element -->
  <text x="80" y="360" font-family="Courier New, monospace" font-size="136" font-weight="700" fill="#27C46B" letter-spacing="6">05:00:00</text>

  <!-- Overdue badge -->
  <rect x="80" y="378" width="320" height="38" rx="6" fill="#EF4444" opacity="0.15"/>
  <text x="97" y="403" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#EF4444">PRAZO ESTOURADO — estadia correndo</text>

  <!-- Tagline -->
  <text x="80" y="468" font-family="Arial, Helvetica, sans-serif" font-size="44" fill="#8A9099">Ficou parado mais de 5h?</text>
  <text x="80" y="525" font-family="Arial Black, sans-serif" font-size="50" font-weight="900" fill="#FFFFFF">Eles te devem.</text>

  <!-- Law badge -->
  <rect x="80" y="558" width="460" height="44" rx="8" fill="#FFC400" opacity="0.12"/>
  <text x="100" y="585" font-family="Arial, sans-serif" font-size="20" fill="#FFC400">Lei 13.103/2015 · Direito garantido ao motorista</text>

  <!-- Right side: phone mockup hint -->
  <rect x="920" y="80" width="220" height="440" rx="28" fill="#1a1e24" stroke="#2a3040" stroke-width="2"/>
  <rect x="935" y="100" width="190" height="400" rx="20" fill="#111417"/>
  <!-- Mock timer inside phone -->
  <text x="1030" y="240" font-family="Courier New, monospace" font-size="28" font-weight="700" fill="#27C46B" text-anchor="middle">05:23:41</text>
  <text x="1030" y="272" font-family="Arial, sans-serif" font-size="11" fill="#EF4444" text-anchor="middle" font-weight="700">PRAZO ESTOURADO</text>
  <!-- Mock value inside phone -->
  <text x="1030" y="330" font-family="Arial, sans-serif" font-size="11" fill="#8A9099" text-anchor="middle">Valor acumulado</text>
  <text x="1030" y="358" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" fill="#27C46B" text-anchor="middle">R$ 287,90</text>
  <!-- Mock button inside phone -->
  <rect x="955" y="390" width="150" height="44" rx="10" fill="#FFC400"/>
  <text x="1030" y="418" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#111417" text-anchor="middle">GERAR COBRANÇA</text>
</svg>
